<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word to PDF | Convert DOCX to PDF Online - BALRAM TECH HUB</title>
  <meta name="description" content="Convert your Word documents (DOCX/DOC) to PDF online for free. Fast, secure and high quality conversion." />
  
  <link rel="stylesheet" href="css_styles/base.css" />
  <link rel="stylesheet" href="css_styles/layout.css" />
  <script src="js_logic/config.js"></script>
  
  <!-- Reuse existing converter styles if possible or common ones -->
  <style>
    .convert-card {
      max-width: 800px;
      margin: 40px auto;
      background: var(--bg-panel);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      border: 1px solid var(--border-panel);
      box-shadow: var(--shadow-strong);
    }
    .upload-box {
      border: 2px dashed var(--accent-primary);
      border-radius: 20px;
      padding: 60px 20px;
      background: var(--accent-primary-soft);
      cursor: pointer;
      transition: all var(--transition-fast);
      margin-bottom: 30px;
    }
    .upload-box:hover {
      transform: scale(1.01);
      background: rgba(255, 82, 82, 0.15);
    }
    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
      display: block;
    }
    .file-input-hidden {
      display: none;
    }
    #fileInfo {
      margin: 20px 0;
      font-weight: 600;
      color: var(--text-main);
    }
  </style>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8108513927220073"
       crossorigin="anonymous"></script>
</head>

<body>
  <header class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="brand">
        <div class="brand-icon"><span class="brand-dot"></span><span class="brand-letter">Q</span></div>
        <span class="brand-text">BALRAM TECH HUB</span>
      </a>
      <nav class="nav-links">
        <a href="html_body/organize_pdfs/merge.html" class="nav-link">Merge</a>
        <a href="html_body/optimize_pdfs/compress.html" class="nav-link">Compress</a>
        <a href="word-to-pdf.html" class="nav-link active">Word to PDF</a>
      </nav>
    </div>
    <div class="nav-right">
       <button class="nav-text-btn" onclick="location.href='login.html'">Log in</button>
       <button class="nav-primary-btn" onclick="location.href='signup.html'">Get Started</button>
    </div>
  </header>

  <main class="tools-container">
    <div class="convert-card">
      <p class="hero-eyebrow">Convert to PDF</p>
      <h1>Word to PDF</h1>
      <p class="hero-subtitle">Make DOC and DOCX files easy to read by converting them to PDF.</p>

      <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".doc,.docx" class="file-input-hidden" />
        <span class="upload-icon">📄</span>
        <span class="upload-text" style="font-size: 1.2rem; font-weight: 700; display: block; color: var(--text-main);">Choose Word File</span>
        <span class="upload-subtext" style="color: var(--text-sub);">or drop file here</span>
      </div>

      <div id="fileInfo">No file selected</div>
      <button id="convertBtn" class="btn-primary" style="width: 100%; height: 56px; font-size: 1.1rem;" disabled>Convert to PDF</button>
      <p id="statusMsg" style="margin-top: 20px; font-weight: 500;"></p>
    </div>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const convertBtn = document.getElementById('convertBtn');
    const statusMsg = document.getElementById('statusMsg');
    const API_BASE = window.API_BASE_URL || "https://pdfcraft-backend-1.onrender.com";

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        fileInfo.textContent = `Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        convertBtn.disabled = false;
      }
    };

    convertBtn.onclick = async () => {
      const file = fileInput.files[0];
      if (!file) return;

      try {
        statusMsg.style.color = 'var(--text-main)';
        statusMsg.textContent = "Converting your file... Please wait.";
        convertBtn.disabled = true;

        const formData = new FormData();
        formData.append('file', file);

        const response = await fetch(`${API_BASE}/api/word-to-pdf`, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) throw new Error("Conversion failed");

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name.replace(/\.[^/.]+$/, "") + ".pdf";
        a.click();
        
        statusMsg.style.color = '#2ecc71';
        statusMsg.textContent = "Success! Your PDF is ready.";
      } catch (err) {
        console.error(err);
        statusMsg.style.color = '#ff5252';
        statusMsg.textContent = "Error: Conversion failed. The service might be busy.";
      } finally {
        convertBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
